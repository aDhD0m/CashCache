# thunderbird.toml -- Overextension Fade module
# Ref: TALON_ARCHITECTURE_v3.2.0 S4.3

[module]
name = "thunderbird"
tier = "hatch"
enabled = true
supervision = "supervised_autonomy"

[module.strategy]
type = "options_long"
hold_period_days_min = 2
hold_period_days_max = 10

[module.signals]
# Bollinger extremes, volume climax, momentum divergence
bollinger_deviation = 2.5
volume_climax_multiplier = 3.0       # 3x average daily volume

[module.filters]
min_market_cap = 2_000_000_000
max_bid_ask_spread = 0.10
min_open_interest = 500
min_daily_volume = 100

[module.options]
strike_selection = "atm_or_1_otm"
expiration_weeks_min = 2
expiration_weeks_max = 4             # shorter than Firebird

[module.exits]
target_premium_gain_pct = 50.0
time_stop_dte_remaining_pct = 50.0
stop_loss_premium_pct = -50.0
