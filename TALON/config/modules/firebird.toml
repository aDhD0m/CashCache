# firebird.toml -- Oversold Reversal module
# Ref: TALON_ARCHITECTURE_v3.2.0 S4.2

[module]
name = "firebird"
tier = "hatch"
enabled = true
supervision = "supervised_autonomy"

[module.strategy]
type = "options_long"
hold_period_days_min = 2
hold_period_days_max = 14

[module.signals]
# RSI, volume divergence, S/R proximity
rsi_oversold_threshold = 30
volume_divergence_lookback_bars = 10

[module.filters]
min_market_cap = 2_000_000_000       # $2B
max_bid_ask_spread = 0.10            # $0.10
min_open_interest = 500
min_daily_volume = 100

[module.options]
strike_selection = "atm_or_1_otm"
expiration_weeks_min = 4
expiration_weeks_max = 8

[module.exits]
target_premium_gain_pct = 50.0
time_stop_dte_remaining_pct = 50.0   # exit at 50% of DTE remaining
stop_loss_premium_pct = -50.0
